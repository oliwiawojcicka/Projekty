<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Style-Type" content="text/css">

    <title>Write to Santa</title>

    <link rel="stylesheet" href="form.css">
    <script src="form.js" defer></script>
</head>


<body>

    <!-- Nawigacja z przyciskiem powrotu -->
    <nav class="return-nav">
        <!-- przycisk powrotu - back do strony glownej-->
        <a href="index.html" class="back-arrow">←</a>
    </nav>

    <main>

        <form id="santa-form" class="form-wrapper" novalidate> <!-- formularz ma wyłączoną walidację HTML -->

            <h1 class="form-title">Letter to Santa</h1>

            <!-- Przyciski nawigacyjne About i Wishlist -->
            <div class="section-tabs">
                <button class="tab-button active" data-section="about">About me</button>
                <button class="tab-button" data-section="wishlist">My wishlist</button>
            </div>

            <!-- Sekcja About Me -->
            <fieldset class="form-section" id="about-section">
                <label for="name">Your name:</label> <!-- pole tekstowe your name -->
                <input type="text" id="name" name="name" placeholder="e.g. Ania"> <!-- typ inputu text -->
                <p class="error-message" id="name-error"></p> <!-- miejsce na komunikat o błędzie -->

                <label for="age">Your age:</label> <!-- pole typu number your age -->
                <input type="number" id="age" name="age" placeholder="e.g. 8"> <!-- typ inputu number -->
                <p class="error-message" id="age-error"></p> <!-- miejsce na komunikat o błędzie -->

                <label for="city">Your city or magical land:</label>
                <input type="text" id="city" name="city" placeholder="e.g. Warsaw or Snowland">
                <p class="error-message" id="city-error"></p>

            </fieldset>

            <!-- Sekcja My Wishlist -->
            <fieldset class="form-section hidden" id="wishlist-section">

                <label>Choose the presents you'd like:</label>

                <div class="wishlist-options">
                    <label>
                        <input type="radio" name="gift" value="LEGO set">
                        LEGO set
                    </label>

                    <label>
                        <input type="radio" name="gift" value="Doll">
                        Doll
                    </label>

                    <label>
                        <input type="radio" name="gift" value="Toy car">
                        Toy car
                    </label>
                </div>
            </fieldset> 
            <!-- Przyciski formularza Submit i Reset -->
            <div class="form-buttons">
                <button type="submit" class="send-btn">Send to Santa</button>
                <button type="reset" class="reset-btn">Start over</button>
            </div>

        </form>

        <!-- Pole Letter Summary -->
        <section id="santa-letter" class="hidden">
            <h2></h2>
            <p id="letter-text"></p>
        </section>

    </main>

</body>
</html>
